name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package workflow components
        run: |
          mkdir -p .opencode/agent
          mkdir -p .opencode/command
          mkdir -p .opencode/skill
          mkdir -p .opencode/plugin
          
          # Copy contents (ensuring singular folder names for OpenCode CLI)
          cp -r agents/* .opencode/agent/
          cp -r commands/* .opencode/command/
          cp -r skills/* .opencode/skill/
          cp -r plugins/* .opencode/plugin/
          
          # Create zip archive
          zip -r opencode-workflow-setup.zip .opencode/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: opencode-workflow-setup.zip
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 OpenCode Workflow ${{ github.ref_name }}
            
            This release contains the pre-packaged `.opencode` directory structure.
            
            ### 📥 Installation
            1. Download `opencode-workflow-setup.zip` from the assets below.
            2. Extract it into your project's root directory.
            3. You should now have a `.opencode/` folder ready to use.
            
            ---
            *Automated release generated by GitHub Actions.*
          draft: false
          prerelease: false

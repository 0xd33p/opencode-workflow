name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package workflow components
        run: |
          mkdir -p .opencode/agents
          mkdir -p .opencode/commands
          mkdir -p .opencode/skills
          mkdir -p .opencode/plugins
          
          # Copy contents (preserving plural folder names)
          cp -r agents/* .opencode/agents/
          cp -r commands/* .opencode/commands/
          cp -r skills/* .opencode/skills/
          cp -r plugins/* .opencode/plugins/
          
          # Create zip archive
          zip -r opencode-workflow-setup.zip .opencode/

      - name: Install git-cliff
        run: |
          curl -fsSL https://github.com/orhun/git-cliff/releases/download/v2.8.0/git-cliff-2.8.0-x86_64-unknown-linux-gnu.tar.gz \
            -o /tmp/git-cliff.tar.gz
          tar xzf /tmp/git-cliff.tar.gz -C /tmp
          sudo mv /tmp/git-cliff-2.8.0/git-cliff /usr/local/bin/

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git-cliff --config cliff.toml --current --strip header 2>/dev/null || echo "")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No notable changes for this release."
          fi
          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase
          git-cliff --config cliff.toml --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: opencode-workflow-setup.zip
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 OpenCode Workflow ${{ github.ref_name }}

            ### 📥 Installation
            1. Download `opencode-workflow-setup.zip` from the assets below.
            2. Extract it into your project's root directory.
            3. You should now have a `.opencode/` folder ready to use.

            ---

            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false

      - name: Prune old releases (keep last 5)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName,isDraft,createdAt \
            | jq -r '[.[] | select(.isDraft | not)] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName')
          if [ -n "$RELEASES" ]; then
            echo "$RELEASES" | while read -r tag; do
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes || true
              git push origin --delete "$tag" 2>/dev/null || true
            done
          else
            echo "5 or fewer releases, nothing to prune."
          fi
